<style>
:root{
  --blue-900:#0A2D6E;--blue-800:#0E3D96;--blue-700:#1351B4;--blue-600:#1A64D6;
  --blue-200:#BFDBFE;--blue-100:#DBEAFE;--blue-50:#EFF6FF;
  --green-700:#0C6B3E;--green-600:#15803D;--green-100:#DCFCE7;--green-50:#F0FDF4;
  --red-700:#B91C1C;--red-600:#DC2626;--red-100:#FEE2E2;--red-50:#FEF2F2;
  --amber-700:#B45309;--amber-100:#FEF3C7;--amber-50:#FFFBEB;
  --gray-900:#0F172A;--gray-800:#1E293B;--gray-700:#334155;--gray-600:#475569;
  --gray-500:#64748B;--gray-400:#94A3B8;--gray-300:#CBD5E1;--gray-200:#E2E8F0;
  --gray-100:#F1F5F9;--gray-50:#F8FAFC;--white:#FFFFFF;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(19,81,180,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(19,81,180,.12),0 4px 8px rgba(0,0,0,.06);
  --shadow-xl:0 16px 48px rgba(19,81,180,.16),0 8px 16px rgba(0,0,0,.08);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;--r-2xl:24px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#EEF2F7;color:var(--gray-800);padding-bottom:72px;font-size:14px;line-height:1.5}

/* ── INPUTS ── */
.inp{width:100%;background:var(--white);border:1.5px solid var(--gray-300);border-radius:var(--r-md);padding:11px 14px;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .18s,box-shadow .18s;color:var(--gray-800);font-family:inherit}
.inp:focus{border-color:var(--blue-700);box-shadow:0 0 0 3px rgba(19,81,180,.12);background:var(--white)}
.inp::placeholder{color:var(--gray-400)}
select.inp{cursor:pointer}

/* ── BUTTONS ── */
.bp{background:var(--blue-700);border:none;border-radius:var(--r-md);padding:12px 16px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .18s,box-shadow .18s,transform .1s;box-shadow:0 2px 8px rgba(19,81,180,.28);font-family:inherit;letter-spacing:.01em}
.bp:hover:not(:disabled){background:var(--blue-800);box-shadow:0 4px 14px rgba(19,81,180,.38)}
.bp:active:not(:disabled){transform:translateY(1px)}
.bs{background:var(--white);border:1.5px solid var(--gray-300);border-radius:var(--r-md);padding:11px 16px;color:var(--gray-700);font-size:14px;font-weight:500;cursor:pointer;width:100%;transition:border-color .18s,background .18s;font-family:inherit}
.bs:hover:not(:disabled){border-color:var(--gray-400);background:var(--gray-50)}
.bg{background:var(--green-700);border:none;border-radius:var(--r-md);padding:12px 16px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .18s,box-shadow .18s;box-shadow:0 2px 8px rgba(12,107,62,.28);font-family:inherit}
.bg:hover:not(:disabled){background:var(--green-600);box-shadow:0 4px 14px rgba(12,107,62,.38)}
.br{background:var(--red-700);border:none;border-radius:var(--r-md);padding:12px 16px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .18s,box-shadow .18s;box-shadow:0 2px 8px rgba(185,28,28,.28);font-family:inherit}
.br:hover:not(:disabled){background:var(--red-600)}

/* ── ALERTS ── */
.ok{background:var(--green-50);border:1px solid #86EFAC;border-radius:var(--r-md);padding:10px 14px;color:var(--green-700);font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500}
.er{background:var(--red-50);border:1px solid #FCA5A5;border-radius:var(--r-md);padding:10px 14px;color:var(--red-700);font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500}
.wn{background:var(--amber-50);border:1px solid #FCD34D;border-radius:var(--r-md);padding:10px 14px;color:var(--amber-700);font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500}
.inf{background:var(--blue-50);border:1px solid var(--blue-200);border-radius:var(--r-md);padding:10px 14px;color:var(--blue-700);font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--r-xl);box-shadow:var(--shadow-md);border:1px solid var(--gray-200);}
.ch{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center;background:var(--gray-50)}
.ch-title{font-size:13px;font-weight:700;color:var(--gray-800);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.ch-accent{width:3px;height:16px;background:var(--blue-700);border-radius:2px;flex-shrink:0}

/* ── STAT CARD ── */
.stat-card{background:var(--white);border-radius:var(--r-xl);box-shadow:var(--shadow-md);border:1px solid var(--gray-200);padding:18px 16px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:currentColor;opacity:.15}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px;flex-shrink:0}
.stat-val{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);margin-top:2px}
.stat-sub{font-size:11px;color:var(--gray-400);margin-top:2px}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;z-index:50;height:64px;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nb{flex:1;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;position:relative;transition:background .15s}
.nb .ni{font-size:19px;line-height:1;transition:transform .18s}
.nb .nl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;transition:color .15s}
.nb.on .nl{color:var(--blue-700)}
.nb:not(.on) .nl{color:var(--gray-400)}
.nb.on .ni{transform:translateY(-1px)}
.nb:not(.on) .ni{filter:grayscale(.4);opacity:.7}
.nb.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:var(--blue-700);border-radius:0 0 3px 3px}
.nbadge{position:absolute;top:6px;right:calc(50% - 20px);background:var(--red-600);color:#fff;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;padding:0 4px;border:2px solid var(--white)}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:11px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
.tbl tbody tr:hover td{background:var(--blue-50)}
.tbl tbody tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-600);transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--blue-700);color:var(--blue-700)}
.pill.on{background:var(--blue-700);border-color:var(--blue-700);color:#fff}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;gap:4px}
.badge-blue{background:var(--blue-50);color:var(--blue-700);border:1px solid var(--blue-200)}
.badge-green{background:var(--green-50);color:var(--green-700);border:1px solid #86EFAC}
.badge-red{background:var(--red-50);color:var(--red-700);border:1px solid #FCA5A5}
.badge-amber{background:var(--amber-50);color:var(--amber-700);border:1px solid #FCD34D}
.badge-gray{background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200)}
.tag-s{background:var(--red-50);color:var(--red-700);border:1px solid #FCA5A5;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-e{background:var(--green-50);color:var(--green-700);border:1px solid #86EFAC;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* ── DROPDOWN ── */
.dark,.dark body{background:#070D1A!important;color:#E2E8F0!important}
.dark .card{background:#0F172A!important;border-color:#1E293B!important;color:#E2E8F0!important;box-shadow:0 2px 12px rgba(0,0,0,0.4)!important}
.dark .card *{color:#E2E8F0!important}
.dark .inp{background:#0F172A!important;border-color:#1E293B!important;color:#F1F5F9!important}
.dark .inp::placeholder{color:#475569!important}
.dark .ch{border-color:#1E293B!important;background:#0F172A!important}
.dark .ch-title span,.dark .ch-title{color:#E2E8F0!important}
.dark .ch-accent{background:#1351B4!important}
.dark .bnav{background:#0A0F1E!important;border-color:#1E293B!important;box-shadow:0 -2px 20px rgba(0,0,0,0.5)!important}
.dark .nb .nl{color:#475569!important}
.dark .nb.on{background:transparent!important}
.nb.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--blue);border-radius:3px 3px 0 0;}
.nb.on .ni{transform:translateY(-2px) scale(1.1);}
.dark .nb.on .nl{color:#60A5FA!important}
.dark .nb.on .ni{filter:none!important}
.dark .inf{color:#94A3B8!important}
.dark .bp{background:#1351B4!important}
.dark .br{background:#DC2626!important}
.dark textarea,.dark select{background:#0F172A!important;border-color:#1E293B!important;color:#F1F5F9!important}
.dark .badge{background:#1E293B!important;color:#94A3B8!important}
.dark .badge-blue{background:#1351B4!important;color:#fff!important}
.dark .badge-green{background:#059669!important;color:#fff!important}
.dark .badge-red{background:#DC2626!important;color:#fff!important}
.dark .tbl th{background:#0A0F1E!important;color:#94A3B8!important;border-color:#1E293B!important}
.dark .tbl td{border-color:#1E293B!important;color:#E2E8F0!important}
.dark .tbl tr:hover td{background:#1E293B!important}
.dark label{color:#94A3B8!important}
.dark .wn{background:#1E293B!important;color:#94A3B8!important;border-color:#334155!important}
.dark .ok{background:#064E3B!important;color:#6EE7B7!important}
.dark .er{background:#450A0A!important;color:#FCA5A5!important}
.dark .sdi{background:#0F172A!important;color:#E2E8F0!important}
.dark .sdi:hover{background:#1E293B!important}
.dark .sdrop{background:#0F172A!important;border-color:#1E293B!important}
.sdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--blue-700);border-radius:var(--r-lg);z-index:500;box-shadow:0 8px 32px rgba(0,0,0,0.2);max-height:320px;overflow-y:auto}
.sdi{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gray-100);transition:background .12s}
.sdi:hover{background:var(--blue-50)}
.sdi:last-child{border-bottom:none}

/* ── QTD BUTTONS ── */
.qb{padding:8px 14px;border-radius:8px;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-700);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit}
.qb:hover{border-color:var(--blue-700);color:var(--blue-700);background:var(--blue-50)}
.qb.on{border-color:var(--blue-700);background:var(--blue-700);color:#fff}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-line{flex:1;height:1px;background:var(--gray-200)}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);white-space:nowrap}

/* ── UTILS ── */
.photo-wrap{position:relative;display:inline-block}
.photo-cam{position:absolute;bottom:-2px;right:-2px;width:30px;height:30px;border-radius:50%;background:var(--blue-700);border:2.5px solid var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:var(--shadow-md)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp .25s ease}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS SWITCHER ── */
.tab-sw{display:flex;background:var(--gray-100);border-radius:var(--r-md);padding:3px;gap:3px;margin-bottom:16px}
.tab-sw button{flex:1;padding:9px 4px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.tab-sw button.on{background:var(--white);color:var(--blue-700);box-shadow:var(--shadow-sm)}
.tab-sw button:not(.on){background:transparent;color:var(--gray-500)}

/* ── SHIFT CARD ── */
.shift-card{background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-800) 100%);border-radius:var(--r-xl);padding:16px 18px;margin-bottom:14px;color:#fff;box-shadow:var(--shadow-lg)}

/* ── SCROLL ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
</style>

  var dias=Math.floor((new Date()-new Date(v.registradoEm))/86400000);
  var atrasado=dias>=15;
  return(<div style={{background:atrasado?'#FEF2F2':(selecionado?'#EFF6FF':'#fff'),borderRadius:12,border:'1.5px solid '+(selecionado?'#1351B4':(atrasado?'#FCA5A5':'#E2E8F0')),padding:12,marginBottom:8,display:'flex',gap:10,alignItems:'flex-start'}}>

      <div style={{fontSize:11,color:'#64748B'}}>{v.quantidade} un. · Lote {v.lote} · Val {v.validade}{v.fornecedor?' · '+v.fornecedor:''}</div>
      <div style={{fontSize:11,marginTop:2,color:atrasado?'#DC2626':'#94A3B8',fontWeight:atrasado?700:400}}>

  useEffect(function(){
    if(!db)return;

      var lista=s.docs.map(function(d){var o={id:d.id};var data=d.data();for(var k in data)o[k]=data[k];return o;});
      lista.sort(function(a,b){return new Date(b.registradoEm||0)-new Date(a.registradoEm||0);});
      setVales(lista);
      setCarregando(false);
      setErroCarregar('');
    },function(e){
      console.error('Erro ao carregar vales:',e);
      setCarregando(false);
      setErroCarregar((e&&e.code)||(e&&e.message)||'erro desconhecido');
    });

  var notasExistentes=(function(){
    var entradas=entries.filter(function(e){return e.tipo==='entrada'&&e.nfNumero;});
    var gmap={};
    entradas.forEach(function(e){
      var k=e.nfNumero+'|||'+(e.nfFornecedor||'');
      if(!gmap[k])gmap[k]={nf:e.nfNumero,forn:e.nfFornecedor||'',data:e.nfData||'',dt:e.criadoEm||'',count:0};
      gmap[k].count++;
      if((e.criadoEm||'')>(gmap[k].dt||''))gmap[k].dt=e.criadoEm||'';
    });
    return Object.values(gmap).sort(function(a,b){return (b.dt||'').localeCompare(a.dt||'');});

    setSelecionados(function(prev){
      var n=Object.assign({},prev);

    setSelecionados({});
  }

  var qtdSelecionados=idsSelecionados.length;

      nfNum=partes[0];nfForn=partes[1]||'';

      if(!nfNumNovo.trim()){alert('Informe o número da nova nota.');return;}
      nfNum=nfNumNovo.trim();nfForn=nfFornNovo.trim();nfData=nfDataNovo.trim();

      db.collection('vales').doc(id).update({
        status:'concluido',nfNumero:nfNum,nfFornecedor:nfForn,nfData:nfData,

      <div style={{background:'#fff',borderRadius:20,padding:20,maxWidth:480,width:'100%',maxHeight:'85vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>

        </div>

      return prev.concat([item]);

  function salvarDivergencia(){

    if(!divRealMed||!divRealQty){alert2('Informe o medicamento e quantidade que chegou de verdade.');return;}
    setSalvandoDiv(true);
    var nfNum=loteNota.trim();
    var nfForn=obsNota.trim();
    var hoje=new Date().toISOString();
    // 1. Registrar entry da NOTA (o que está escrito na nota — para prestação de contas)
    var p1=onSave({
      medicamentoId:divNotaMed.id,medicamentoNome:divNotaMed.nome,
      tipo:'entrada',quantidade:Number(divNotaQty)||0,

      divergencia:true,divergenciaTipo:'nota'
    });
    // 2. Registrar entry do REAL (o que chegou de verdade — entra no estoque)
    var p2=divRealMed?onSave({
      medicamentoId:divRealMed.id,medicamentoNome:divRealMed.nome,
      tipo:'entrada',quantidade:Number(divRealQty)||0,
      lote:divRealLote.trim(),validade:divRealVal.trim(),
      observacao:'REAL — NF '+(nfNum||'')+(nfForn?' - '+nfForn:''),
      nfNumero:nfNum,nfFornecedor:nfForn,nfData:valNota.trim(),
      categoriaMed:divRealMed.categoria||'medicamento',
      divergencia:true,divergenciaTipo:'real'
    }):Promise.resolve(null);
    // 3. Salvar registro de divergência para auditoria

      realMedId:divRealMed?divRealMed.id:'',realMedNome:divRealMed?divRealMed.nome:'Não chegou',
      realQty:Number(divRealQty)||0,realLote:divRealLote.trim(),realValidade:divRealVal.trim(),
      motivo:divMotivo.trim(),status:'pendente',
      tipo:divRealMed?'substituicao':'nao_chegou',

    });
    Promise.all([p1,p2,p3]).then(function(){
      setSalvandoDiv(false);
      setShowDiv(false);
      setDivNotaMed(null);setDivNotaQty('');
      setDivRealMed(null);setDivRealQty('');setDivRealLote('');setDivRealVal('');
      setDivMotivo('');setDivBusca('');setDivBuscaNota('');
      alert2('Divergência registrada! A coordenação será notificada.');
    }).catch(function(e){
      setSalvandoDiv(false);
      alert2('Erro ao registrar: '+(e&&e.message?e.message:'verifique a conexão'));
    });
  }

  function cadastrarNovoMedVale(){
    if(!novoMedNomeVale.trim()){alert2('Informe o nome do medicamento.');return;}
    if(!novoMedLoteVale.trim()){alert2('Informe o lote.');return;}
    if(!novoMedValVale.trim()){alert2('Informe a validade.');return;}

    }).then(function(ref){

          medId:ref.id,medNome:novoMedNomeVale.trim().toUpperCase(),

        }]);

      setShowNovoMedVale(false);setSalvandoVale(false);
    }).catch(function(e){setSalvandoVale(false);alert2('Erro: '+e.message);});
  }

  function adicionarAoCarrinhoVale(){
    if(!selVale){alert2('Selecione um medicamento.');return;}
    var q=parseInt(qtyVale);
    if(!q||q<=0){alert2('Quantidade inválida.');return;}
    if(!loteVale.trim()){alert2('Informe o lote.');return;}
    if(!valValeItem.trim()){alert2('Informe a validade.');return;}
    setCarrinhoVale(function(prev){
      return prev.concat([{
        medId:selVale.id,medNome:selVale.nome,
        qty:q,lote:loteVale.trim(),validade:valValeItem.trim(),
        categoriaMed:selVale.categoria||'medicamento'
      }]);
    });
    setSelVale(null);setSearchVale('');setQtyVale('');setLoteVale('');setValValeItem('');
  }

  function removerDoCarrinhoVale(idx){
    setCarrinhoVale(function(prev){return prev.filter(function(_,i){return i!==idx;});});
  }

  function salvarVale(){
    if(!carrinhoVale.length){alert2('Adicione ao menos um medicamento ao vale.');return;}
    confirm2('Confirmar Vale','Registrar entrada de '+carrinhoVale.length+' medicamento(s) via VALE (sem nota fiscal ainda)?',_execSalvarVale,'success','Confirmar');
  }

  function _execSalvarVale(){
    setSalvandoVale(true);
    var forn=valeForn.trim();
    var obs=valeObs.trim();
    var items=carrinhoVale.slice();
    var hoje=new Date().toISOString();

    // PASSO 1: testar permissão na coleção 'vales' ANTES de mexer no estoque.
    // Isso evita dar entrada no estoque sem conseguir registrar o vale como pendente.
    db.collection('vales').add({
      teste:true,registradoPor:user.name,registradoEm:hoje
    }).then(function(testRef){
      // Permissão OK — apaga o documento de teste e segue com o fluxo real
      return testRef.delete().then(function(){return true;});
    }).catch(function(e){
      setSalvandoVale(false);
      var msgErro=(e&&e.code)||(e&&e.message)||'erro desconhecido';
      alert2('Não foi possível registrar o vale: '+msgErro+'. Nada foi alterado no estoque ainda. Peça para adicionar a coleção "vales" nas regras do Firebase e tente novamente.');
      return false;
    }).then(function(podeContinuar){
      if(!podeContinuar)return;

      // PASSO 2: permissão confirmada, agora processa cada item (entrada + vale juntos)
      var total=items.length;
      var concluidos=0;
      var temErro=false;
      var ultimoErroVale=null;
      function finalizarSeCompleto(){
        if(concluidos<total)return;
        if(temErro){
          setSalvandoVale(false);
          var msgErro=ultimoErroVale?(ultimoErroVale.code||ultimoErroVale.message||'erro desconhecido'):'erro desconhecido';
          alert2('Parte do vale não foi registrada: '+msgErro+'. Os itens que falharam continuam no carrinho — tente confirmar novamente.');
          return;
        }
        setCarrinhoVale([]);setValeForn('');setValeObs('');
        setSalvandoVale(false);
        alert2('Vale registrado! O estoque foi atualizado. Lembre-se de vincular a Nota Fiscal quando ela chegar (aba 🧾 Vale → Pendentes).');
      }
      items.forEach(function(item2){
        var entryObj={
          medicamentoId:item2.medId,medicamentoNome:item2.medNome,
          tipo:'entrada',quantidade:Number(item2.qty)||0,
          lote:item2.lote,validade:item2.validade,
          observacao:'VALE'+(forn?' - '+forn:'')+(obs?' - '+obs:''),
          categoriaMed:item2.categoriaMed,
          viaVale:true
        };
        onSave(entryObj).then(function(){
          return db.collection('vales').add({
            medicamentoId:item2.medId,medicamentoNome:item2.medNome,
            quantidade:Number(item2.qty)||0,lote:item2.lote,validade:item2.validade,
            fornecedor:forn,obs:obs,
            status:'pendente',
            nfNumero:'',nfFornecedor:'',nfData:'',
            registradoPor:user.name,registradoEm:hoje,date:todayStr()
          });
        }).then(function(){
          // Remove este item do carrinho local (já está salvo com sucesso)
          setCarrinhoVale(function(prev){return prev.filter(function(x){return x!==item2;});});
          concluidos++;
          finalizarSeCompleto();
        }).catch(function(e){
          console.error('Erro vale item:',e);
          temErro=true;ultimoErroVale=e;concluidos++;
          finalizarSeCompleto();
        });
      });
    });
  }

  function cadastrarNovoMed(){
    if(!novoMedNome.trim())return;
    setSalvandoNota(true);
    db.collection('medicamentos').add({nome:novoMedNome.trim().toUpperCase(),categoria:novoMedCat,tipo:novoMedCat,ean:'',estoqueMin:5,criadoEm:new Date().toISOString(),criadoPor:user.name}).then(function(ref){

      if(q2>0){
        var item={medId:ref.id,medNome:novoMedNome.trim().toUpperCase(),qty:q2,lote:novoMedLote||loteNotaReal||'',validade:novoMedVal||valNotaReal||'',novo:true};

    }).catch(function(e){setSalvandoNota(false);alert('Erro: '+e.message);});

  function salvarCarrinhoNota(){
    if(!carrinhoNota.length)return;
    confirm2('Confirmar entrada','Registrar entrada de '+carrinhoNota.length+' medicamento(s) no estoque?',_execSalvarCarrinhoNota,'success','Confirmar');
  }
  function _execSalvarCarrinhoNota(){
    if(!carrinhoNota.length)return;
    setSalvandoNota(true);
    var nfNum=loteNota.trim();
    var nfData=valNota.trim();
    var nfForn=obsNota.trim();
    var obsTexto='NF'+(nfNum?' '+nfNum:'')+(nfForn?' - '+nfForn:'');
    var items=carrinhoNota.slice();
    var total=items.length;
    var concluidos=0;
    var temErro=false;
    function finalizarSeCompleto(){
      if(concluidos<total)return;
      if(temErro){
        setSalvandoNota(false);
        setOkNota('Erro ao registrar. Verifique a conexão e tente novamente.');
        setTimeout(function(){setOkNota('');},6000);
        return;
      }
      playSound('success');
      setCarrinhoNota([]);setLoteNota('');setValNota('');setObsNota('');setLoteNotaReal('');setValNotaReal('');
      setSalvandoNota(false);
      setOkNota('Entrada de '+total+' medicamento(s) registrada com sucesso!');
      setTimeout(function(){setOkNota('');},5000);
    }
    items.forEach(function(item2){
      var _mO=(medications||[]).find(function(m){return m.id===item2.medId;});
      var obj={
        medicamentoId:item2.medId,
        medicamentoNome:item2.medNome,
        tipo:'entrada',
        quantidade:Number(item2.qty)||0,
        lote:item2.lote||'',
        validade:item2.validade||'',
        observacao:obsTexto,
        nfNumero:nfNum,
        nfData:nfData,
        nfFornecedor:nfForn,
        categoriaMed:_mO?(_mO.categoria||'medicamento'):'medicamento'
      };
      try {
        var promise=onSave(obj);
        if(!promise||typeof promise.then!=='function'){
          // onSave não retornou Promise — tratar como erro
          temErro=true;concluidos++;
          finalizarSeCompleto();
          return;
        }
        promise.then(function(){
          concluidos++;
          finalizarSeCompleto();
        }).catch(function(e){
          console.error('Erro entrada Firebase:',e);
          setOkNota('Erro Firebase: '+(e&&e.message?e.message:(e&&e.code?e.code:'sem resposta')));
          temErro=true;concluidos++;
          finalizarSeCompleto();
        });
      } catch(e2) {
        console.error('Erro síncrono entrada:',e2);
        setOkNota('Erro: '+(e2&&e2.message?e2.message:'erro inesperado'));
        temErro=true;concluidos++;
        finalizarSeCompleto();
      }
    });
  }

  function _execSalvarNota(){var it2=[];Object.keys(qtds).forEach(function(medId){var q=parseInt(qtds[medId])||0;if(q>0){var med=medications.find(function(m){return m.id===medId;});if(med)it2.push({med:med,qty:q});}});if(it2.length===0)return;setSalvandoNota(true);var nfNum=loteNota.trim();var nfData=valNota.trim();var nfForn=obsNota.trim();var obsTexto='NF'+(nfNum?' '+nfNum:'')+(nfForn?' - '+nfForn:'');var i2=0;function nx(){if(i2>=it2.length){playSound('success');setOkNota('Entrada de '+it2.length+' item(ns) registrada! NF: '+(nfNum||'sem numero'));setQtds({});setLoteNota('');setValNota('');setObsNota('');setLoteNotaReal('');setValNotaReal('');setSalvandoNota(false);setTimeout(function(){setOkNota('');},5000);return;}var item=it2[i2++];onSave({medicamentoId:item.med.id,medicamentoNome:item.med.nome,ean:item.med.ean||'',tipo:'entrada',quantidade:Number(item.qty)||0,lote:loteNotaReal.trim(),validade:valNotaReal.trim(),observacao:obsTexto,nfNumero:nfNum,nfData:nfData,nfFornecedor:nfForn,categoriaMed:item.med.categoria||'medicamento'}).then(nx).catch(function(e){console.error('Erro nota:',e);setSalvandoNota(false);setOkNota('Erro ao registrar: '+(e&&e.message?e.message:'verifique a conexão'));setTimeout(function(){setOkNota('');},5000);});}nx();}  function salvarNota(){var itens=[];Object.keys(qtds).forEach(function(medId){var q=parseInt(qtds[medId])||0;if(q>0){var med=medications.find(function(m){return m.id===medId;});if(med)itens.push({med:med,qty:q});}});if(itens.length===0){setOkNota('Nenhuma quantidade informada.');return;}confirm2('Confirmar entrada','Registrar entrada de '+itens.length+' medicamento(s) no estoque?',function(){_execSalvarNota();},'success','Confirmar');}
return(

function DivPendenteCard(props){
  var d=props.d;var db=props.db;var user=props.user;var B=props.B||'#1351B4';

  var _salvando=useState(false);var salvando=_salvando[0];var setSalvando=_salvando[1];
  function confirmarSaida(){
    var qty=parseInt(qtyFic)||0;
    if(qty<=0){alert('Informe uma quantidade válida.');return;}
    setSalvando(true);
    var ficObj={criadoEm:new Date().toISOString(),date:todayStr(),
      autorId:user.uid,autorNome:user.name,autorCargo:user.role||'',autorColor:user.color||B,
      medicamentoId:d.notaMedId,medicamentoNome:d.notaMedNome,
      tipo:'saida',quantidade:qty,lote:'',validade:'',

      ficticioDiv:true,divId:d.id

      var novoTotal=(d.saidaFicticiaTotal||0)+qty;
      var novoStatus=novoTotal>=(d.saidaPendenteQty||d.notaQty||0)?'confirmada':'pendente';
      var upd={saidaFicticiaTotal:novoTotal,status:novoStatus};
      if(novoStatus==='confirmada'){upd.confirmadoPor=user.name;upd.confirmadoEm=new Date().toISOString();}
      return db.collection('divergencias').doc(d.id).update(upd);
    }).then(function(){
      setSalvando(false);
    }).catch(function(e){
      setSalvando(false);
      alert('Erro: '+e.message);
    });
  }
  return(<div style={{background:'#FFFBEB',borderRadius:14,border:'1.5px solid #FCD34D',padding:14,marginBottom:10}}>
    <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:6}}>

    </div>
    {faltaDar>0&&<div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <span style={{fontSize:12,color:'#64748B'}}>Dar saída fictícia de:</span>
      <input type="number" value={qtyFic} onChange={function(e){setQtyFic(e.target.value);}} disabled={salvando} style={{width:80,padding:'7px 10px',border:'1.5px solid #FCD34D',borderRadius:8,fontSize:14,fontWeight:700,textAlign:'center'}}/>
      <span style={{fontSize:12,color:'#64748B'}}>un. de <strong>{d.notaMedNome}</strong></span>

  function parsearPDF(texto,filename){

      }
      // Padrão 2: linha com apenas nome de medicamento conhecido (para OCR fragmentado)
      var m2=l.match(/^([A-Z][A-Za-z]{3,}(?:\s+[A-Za-z0-9]+){1,4})\s+(\d{1,5})\s*$/);
      if(m2){
        var desc2=m2[1].trim();var qtd2=parseFloat(m2[2]);

      }
    }
    var com=aplicarVinculos(itens);
    setPreview({nNF:nNF,dataEmissao:dataEmissao,fornecedorNome:fornecedorNome,fornecedorCNPJ:fornecedorCNPJ,chaveAcesso:'',vTotal:vTotal,nomeArquivo:filename,tipo:tipo,textoOCR:texto.substring(0,3000)});

  }

  async function confirmarEntrada(){

      var it=itemsEdit[i];if(!it.incluir||!it.medId)continue;

      itensSalvos.push({nome:it.xProd,qtd:Math.round(it.qCom),lote:it.lote||''});
    }
    await db.collection('notas_fiscais').add({nNF:preview.nNF,dataEmissao:preview.dataEmissao,fornecedorNome:preview.fornecedorNome,fornecedorCNPJ:preview.fornecedorCNPJ,chaveAcesso:preview.chaveAcesso,vTotal:preview.vTotal,itensSalvos:itensSalvos,importadoPor:user.name,importadoCor:user.color||B,criadoEm:new Date().toISOString(),nomeArquivo:preview.nomeArquivo,tipo:preview.tipo||'xml'});
    setConfirmando(false);setPreview(null);setItemsEdit([]);
    alert('NF-e '+preview.nNF+' importada! '+itensSalvos.length+' item(ns) adicionado(s) ao estoque.');
  }

      await db.collection('entries').add({tipo:'saida',medicamentoId:medSel,medicamentoNome:mO.nome||'',quantidade:qtdEsp,autorNome:user.name,autorCor:user.color||B,autorId:user.uid,lote:'',validade:'',obs:'Espera ATB - '+nomePac.trim(),criadoEm:new Date().toISOString(),date:hj});
    }
    await db.collection('tratamentos_atb').add({pacienteNome:nomePac.trim(),diasTratamento:parseInt(diasTrat)||0,dataInicio:dataIni||hj,medicamentoId:medSel,medicamentoNome:mO.nome||'',nomeMedico:nomeMed.trim(),crmMedico:crmMed.trim(),obs:obsForm.trim(),doses:doses,status:statusIni,criadoPor:user.name,criadoEm:new Date().toISOString()});
    setSaving(false);setShowForm(false);rForm();
  }

  async function iniciarEspera(t){setEditNome(t.pacienteNome);setEditDias(String(t.diasTratamento||''));setEditIni(new Date().toISOString().split('T')[0]);setEditObs(t.obs||'');setEditMed(t.nomeMedico||'');setEditCrm(t.crmMedico||'');setShowEdit(Object.assign({},t,{_esp:true}));setShowDet(null);}
  async function ataqueBtn(t){if(!window.confirm('Marcar como Dose de Ataque? O estoque ja foi baixado no cadastro.'))return;var hj=new Date().toISOString().split('T')[0];var hr=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});await db.collection('tratamentos_atb').doc(t.id).update({status:'dose_ataque',doseAtaqueEm:new Date().toISOString(),doseAtaqueData:hj,doseAtaqueHora:hr,doseAtaqueRegistradoPor:user.name,doseAtaqueCor:user.color||'#8B5CF6'});setShowDet(null);}
  async function regDose(t){
    var hj=new Date().toISOString().split('T')[0];
    var hr=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(!t.medicamentoId)return alert('Medicamento não vinculado.');
    if((stock[t.medicamentoId]||0)<qtdDose)return alert('Estoque insuficiente! Disponivel: '+(stock[t.medicamentoId]||0));
    await db.collection('entries').add({tipo:'saida',medicamentoId:t.medicamentoId,medicamentoNome:t.medicamentoNome||'',quantidade:qtdDose,autorNome:user.name,autorCor:user.color||B,autorId:user.uid,lote:'',validade:'',obs:'ATB - '+t.pacienteNome,criadoEm:new Date().toISOString(),date:hj});
    var nd=[...(t.doses||[]),{data:hj,hora:hr,responsavel:user.name,responsavelCor:user.color||B,qtd:qtdDose}];
    var ns=nd.filter(function(d){return!d.retroativo;}).length>=parseInt(t.diasTratamento)?'concluido':'ativo';
    await db.collection('tratamentos_atb').doc(t.id).update({doses:nd,status:ns});
    setShowDose(null);setQtdDose(2);
  }
  async function finalizar(t){if(!window.confirm('Finalizar tratamento de '+t.pacienteNome+'?'))return;await db.collection('tratamentos_atb').doc(t.id).update({status:'finalizado',finalizadoEm:new Date().toISOString(),finalizadoPor:user.name});setShowDet(null);}
  async function reabrir(t){if(!window.confirm('Reabrir tratamento de '+t.pacienteNome+'?'))return;await db.collection('tratamentos_atb').doc(t.id).update({status:'ativo',reabertoPor:user.name,reabertoEm:new Date().toISOString()});setShowDet(null);}
  async function excluir(t){if(!window.confirm('EXCLUIR permanentemente '+t.pacienteNome+'?'))return;await db.collection('tratamentos_atb').doc(t.id).delete();setShowDet(null);}
  async function desistir(t){await db.collection('tratamentos_atb').doc(t.id).update({status:'desistiu',obsDesistencia:obsDesist,desistiuEm:new Date().toISOString(),desistiuRegistradoPor:user.name});setShowDet(null);setObsDesist('');}
  async function salvarEdit(t){
    var u={pacienteNome:editNome,diasTratamento:parseInt(editDias)||t.diasTratamento,dataInicio:editIni||t.dataInicio,obs:editObs,nomeMedico:editMed,crmMedico:editCrm,editadoPor:user.name,editadoEm:new Date().toISOString()};
    if(t._esp)u.status='ativo';
    await db.collection('tratamentos_atb').doc(t.id).update(u);
    setShowEdit(null);
  }

  var lista=tratamentos.filter(function(t){
    var s=cSt(t);
    var interr=isInterrompido(t);
    var okF=filtro==='todos'||s===filtro||(filtro==='ativos'&&s==='ativo'&&!interr)||(filtro==='interrompido'&&interr);
    var okB=!busca||(t.pacienteNome||'').toLowerCase().includes(busca.toLowerCase())||(t.nomeMedico||'').toLowerCase().includes(busca.toLowerCase());
    return okF&&okB;
  });
  var totalInterrompidos=tratamentos.filter(function(t){return isInterrompido(t);}).length;

  return (
    <div style={{padding:'0 0 80px'}}>
      <div style={{background:'linear-gradient(135deg,#0D1B4B,#1351B4)',padding:'20px 16px 24px',borderRadius:'0 0 24px 24px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{color:'rgba(255,255,255,.7)',fontSize:12,textTransform:'uppercase',letterSpacing:1}}>Farmácia Hospitalar</div>
            <div style={{color:'#fff',fontSize:20,fontWeight:700}}>🧬 Tratamento ATB</div>
          </div>
          <button onClick={function(){setShowForm(true);}} style={{background:'rgba(255,255,255,.2)',border:'1.5px solid rgba(255,255,255,.4)',borderRadius:12,padding:'10px 16px',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>+ Novo</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>

            <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{tratamentos.filter(function(t){return cSt(t)==='ativo';}).length}</div>
            <div style={{color:'rgba(255,255,255,.7)',fontSize:9}}>Tratamento</div>
          </div>
          <div style={{background:'rgba(255,255,255,.12)',borderRadius:12,padding:'8px 4px',textAlign:'center',border:'1px solid rgba(255,255,255,.15)'}}>
            <div style={{fontSize:16}}>⏳</div>
            <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{tratamentos.filter(function(t){return cSt(t)==='espera';}).length}</div>
            <div style={{color:'rgba(255,255,255,.7)',fontSize:9}}>Aguardando</div>
          </div>
          <div style={{background:'rgba(255,255,255,.12)',borderRadius:12,padding:'8px 4px',textAlign:'center',border:'1px solid rgba(255,255,255,.15)'}}>
            <div style={{fontSize:16}}>⚡</div>
            <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{tratamentos.filter(function(t){return cSt(t)==='dose_ataque';}).length}</div>
            <div style={{color:'rgba(255,255,255,.7)',fontSize:9}}>Dose Ataque</div>
          </div>
          <div style={{background:'rgba(255,255,255,.12)',borderRadius:12,padding:'8px 4px',textAlign:'center',border:'1px solid rgba(255,255,255,.15)'}}>

            <div style={{color:'#fff',fontSize:18,fontWeight:800}}>{tratamentos.filter(function(t){return['concluido','finalizado'].includes(cSt(t));}).length}</div>

          </div>
        </div>
      </div>

      <div style={{padding:'0 16px',marginBottom:12}}>

          {[['ativos','💉 Ativos'],['espera','⏳ Espera'],['dose_ataque','⚡ Ataque'],['concluido','✅ Concluidos'],['finalizado','🏁 Finalizados'],['desistiu','❌ Desistiram'],['todos','Todos']].map(function(f){
            return <button key={f[0]} onClick={function(){setFiltro(f[0]);}} style={{flexShrink:0,padding:'7px 9px',borderRadius:10,border:'none',background:filtro===f[0]?B:'#F1F5F9',color:filtro===f[0]?'#fff':'#64748B',fontWeight:filtro===f[0]?700:500,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>{f[1]}</button>;

            ⚠️ Interrompido
            {totalInterrompidos>0&&<span style={{position:'absolute',top:-4,right:-4,background:'#DC2626',color:'#fff',borderRadius:99,width:16,height:16,fontSize:9,fontWeight:800,display:filtro==='interrompido'?'none':'flex',alignItems:'center',justifyContent:'center'}}>{totalInterrompidos}</span>}
          </button>
        </div>
      </div>

      <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:12}}>
        {loading&&<div style={{textAlign:'center',padding:40,color:'#94A3B8'}}>Carregando...</div>}
        {!loading&&lista.length===0&&<div style={{textAlign:'center',padding:40,color:'#94A3B8'}}>Nenhum registro encontrado</div>}
        {lista.map(function(t){
          var s=cSt(t);
          var feitas=(t.doses||[]).filter(function(d){return!d.retroativo;}).length;
          var total=parseInt(t.diasTratamento)||0;
          var pct=total>0?Math.min(100,Math.round((feitas/total)*100)):0;
          var de=dEsp(t);
          var interr=isInterrompido(t);var faltou=diasFaltou(t);
          var bord=interr?'2px solid #EF4444':s==='dose_ataque'?'1.5px solid #DDD6FE':s==='espera'?(de>=3?'2px solid #EF4444':de>=2?'2px solid #F59E0B':'2px solid #FCD34D'):dHj(t)?'2px solid #10B981':'1.5px solid #F1F5F9';
          return (
            <div key={t.id} style={{background:'#fff',borderRadius:16,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,.06)',border:bord,cursor:'pointer'}} onClick={function(){setShowDet(t);}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:'#1E293B'}}>{t.pacienteNome}</div>
                  {(t.nomeMedico||t.crmMedico)&&<div style={{fontSize:11,color:'#64748B',marginTop:2}}>👨‍⚕️ {t.nomeMedico}{t.crmMedico?' · CRM: '+t.crmMedico:''}</div>}
                  {t.criadoPor&&(function(){
                    var uCriador=(allUsers||[]).find(function(u){return u.name===t.criadoPor;});
                    return <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                      {uCriador?<UserAvatar user={uCriador} size={18}/>:<div style={{width:18,height:18,borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#64748B'}}>{t.criadoPor.charAt(0)}</div>}
                      <div style={{fontSize:11,color:'#94A3B8'}}>Cadastrado por <span style={{fontWeight:600,color:'#64748B'}}>{t.criadoPor}</span></div>
                    </div>;
                  })()}
                  {s==='espera'&&<div style={{fontSize:11,fontWeight:600,marginTop:2,color:de>=3?'#DC2626':de>=2?'#D97706':'#D97706'}}>{de>=3?'🚨 '+de+' dias - PRAZO VENCIDO!':'⏳ Dia '+de+' de 3 em espera'}</div>}
                  {s==='dose_ataque'&&<div style={{fontSize:11,fontWeight:600,marginTop:2,color:'#7C3AED'}}>⚡ {t.doseAtaqueRegistradoPor||'—'} · {t.doseAtaqueData?fD(t.doseAtaqueData):''}{t.doseAtaqueHora?' as '+t.doseAtaqueHora:''}</div>}
                  {s!=='espera'&&s!=='dose_ataque'&&total>0&&<div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>Inicio: {fD(t.dataInicio)} · {total} dias</div>}
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                  <span style={{background:cCor(s)+'18',color:cCor(s),fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,border:'1px solid '+cCor(s)+'40'}}>{cIco(s)} {cLbl(s)}</span>
                  {interr&&<span style={{background:'#FEE2E2',color:'#DC2626',fontWeight:800,fontSize:10,padding:'3px 8px',borderRadius:20,border:'1px solid #FECACA'}}>⚠️ {faltou} dia{faltou>1?'s':''} sem dose</span>}
                </div>
              </div>
              {s!=='espera'&&s!=='dose_ataque'&&total>0&&<div style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94A3B8',marginBottom:3}}>
                  <span>Dia {feitas} de {total}</span>

                <div style={{background:'#F1F5F9',borderRadius:99,height:7,overflow:'hidden'}}>
                  <div style={{width:pct+'%',height:'100%',background:s==='desistiu'?'#EF4444':['concluido','finalizado'].includes(s)?'#3B82F6':'#10B981',borderRadius:99}}/>
                </div>
              </div>}
              {s==='espera'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8}}>

                <button onClick={function(e){e.stopPropagation();ataqueBtn(t);}} style={{padding:'9px',background:'#F5F3FF',border:'1.5px solid #DDD6FE',borderRadius:10,color:'#7C3AED',fontWeight:700,fontSize:12,cursor:'pointer'}}>⚡ Dose Ataque</button>
              </div>}
              {pHj(t)&&<button onClick={function(e){e.stopPropagation();setShowDose(t);}} style={{width:'100%',padding:'10px',background:B,border:'none',borderRadius:10,color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',marginTop:6}}>💉 Registrar Dose de Hoje</button>}
            </div>
          );
        })}
      </div>

      {showForm&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={function(){setShowForm(false);rForm();}}>
        <div style={{background:'#fff',borderRadius:'24px 24px 0 0',padding:'24px 20px 40px',width:'100%',maxWidth:480,maxHeight:'92vh',overflowY:'auto'}} onClick={function(e){e.stopPropagation();}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div style={{fontWeight:800,fontSize:18,color:'#1E293B'}}>Novo Registro ATB</div>

              <select value={medSel} onChange={function(e){setMedSel(e.target.value);}} style={{width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontSize:13,background:'#fff',boxSizing:'border-box'}}>
                <option value="">Selecione...</option>

              </select>
            </div>
            {statusIni==='espera'&&<div style={{background:'#FFFBEB',borderRadius:14,padding:16,border:'1.5px solid #FCD34D'}}>
              <div style={{fontSize:13,fontWeight:700,color:'#92400E',marginBottom:4}}>⏳ Dose liberada imediatamente</div>
              <div style={{fontSize:12,color:'#92400E',marginBottom:10}}>Sera baixada do estoque agora. Ate 3 dias para confirmar se e tratamento ou dose de ataque.</div>
              <label style={{fontSize:12,fontWeight:700,color:'#475569',display:'block',marginBottom:8}}>Ampolas liberadas agora:</label>

            </div>}
            {statusIni==='ativo'&&<div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                <div>
                  <label style={{fontSize:12,fontWeight:700,color:'#475569',display:'block',marginBottom:5}}>Total de Dias *</label>
                  <input type="number" value={diasTrat} onChange={function(e){setDiasTrat(e.target.value);}} placeholder="Ex: 7" min="1" max="30" style={{width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontSize:14,boxSizing:'border-box'}}/>

                  <input type="date" value={dataIni} onChange={function(e){setDataIni(e.target.value);}} style={{width:'100%',padding:'12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontSize:14,boxSizing:'border-box'}}/>

function useModal(){
  var _modal=React.useState(null);var modal=_modal[0];var setModal=_modal[1];
  function confirm2(titulo,msg,onConfirm,tipo,confirmTxt){
    setModal({type:'confirm',titulo:titulo,msg:msg,onConfirm:function(){setModal(null);onConfirm();},onCancel:function(){setModal(null);},tipo:tipo,confirmTxt:confirmTxt});
  }
  function alert2(msg,titulo,tipo){
    setModal({type:'alert',titulo:titulo||'Atenção',msg:msg,onClose:function(){setModal(null);},tipo:tipo||'warning'});
  }
  function ModalRender(){
    if(!modal)return null;
    if(modal.type==='confirm')return React.createElement(ModalConfirm,modal);
    return React.createElement(ModalAlert,modal);
  }
  return {confirm2:confirm2,alert2:alert2,ModalRender:ModalRender,modal:modal};
}

class ErrBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,info){console.error('ErrBoundary caught:',e,info);}
  render(){
    if(this.state.err){
      return(<div style={{padding:24,textAlign:'center',color:'#DC2626'}}>
        <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
        <div style={{fontWeight:700,marginBottom:4}}>Erro ao carregar</div>
        <div style={{fontSize:12,color:'#64748B'}}>{String(this.state.err.message||this.state.err)}</div>
        <button onClick={function(){window.location.reload();}} style={{marginTop:12,padding:'8px 16px',background:'#1351B4',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>Recarregar</button>
      </div>);
    }
    return this.props.children;
  }
}

function TabPrevisao(props){
  var user=props.user;var entries=props.entries;var medications=props.medications;var stock=props.stock;var db=props.db;
  var isMan=user.role==='gestor'||user.role==='tecnico';
  var _atas=useState([]);var atas=_atas[0];var setAtas=_atas[1];
  var _sub=useState('previsao');var sub=_sub[0];var setSub=_sub[1];
  var _diasPrev=useState(30);var diasPrev=_diasPrev[0];var setDiasPrev=_diasPrev[1];
  var _ajustes=useState({});var ajustes=_ajustes[0];var setAjustes=_ajustes[1];
  var _ataAberta=useState(null);var ataAberta=_ataAberta[0];var setAtaAberta=_ataAberta[1];
  var _msg=useState('');var msg=_msg[0];var setMsg=_msg[1];
  // estados de cadastro de ata
  var _novaAta=useState('');var novaAta=_novaAta[0];var setNovaAta=_novaAta[1];
  var _novaAtaCat=useState('controlado');var novaAtaCat=_novaAtaCat[0];var setNovaAtaCat=_novaAtaCat[1];
  var _vincMed=useState('');var vincMed=_vincMed[0];var setVincMed=_vincMed[1];
  var _vincAta=useState('');var vincAta=_vincAta[0];var setVincAta=_vincAta[1];
  var _buscaVinc=useState('');var buscaVinc=_buscaVinc[0];var setBuscaVinc=_buscaVinc[1];
  var _loteEdits=useState({});var loteEdits=_loteEdits[0];var setLoteEdits=_loteEdits[1];
  var _salvandoLote=useState(false);var salvandoLote=_salvandoLote[0];var setSalvandoLote=_salvandoLote[1];
  var _buscaLote=useState('');var buscaLote=_buscaLote[0];var setBuscaLote=_buscaLote[1];
  var _filtCatLote=useState('todos');var filtCatLote=_filtCatLote[0];var setFiltCatLote=_filtCatLote[1];
  var _ajBusca=useState('');var ajBusca=_ajBusca[0];var setAjBusca=_ajBusca[1];
  var _numPedido=useState('');var numPedido=_numPedido[0];var setNumPedido=_numPedido[1];
  var _empresa=useState('');var empresa=_empresa[0];var setEmpresa=_empresa[1];
  var _cnpjEmpresa=useState('');var cnpjEmpresa=_cnpjEmpresa[0];var setCnpjEmpresa=_cnpjEmpresa[1];
  var _importPreview=useState(null);var importPreview=_importPreview[0];var setImportPreview=_importPreview[1];
  var _importNome=useState('');var importNome=_importNome[0];var setImportNome=_importNome[1];
  var _importCat=useState('controlado');var importCat=_importCat[0];var setImportCat=_importCat[1];
  var _importando=useState(false);var importando=_importando[0];var setImportando=_importando[1];
  var _ataDetalhe=useState(null);var ataDetalhe=_ataDetalhe[0];var setAtaDetalhe=_ataDetalhe[1];
  var _pastasAbertas=useState({});var pastasAbertas=_pastasAbertas[0];var setPastasAbertas=_pastasAbertas[1];
  var _buscaItemMed=useState({});var buscaItemMed=_buscaItemMed[0];var setBuscaItemMed=_buscaItemMed[1];

  var COR={medicamento:'#1351B4',controlado:'#DC2626',injetavel:'#7C3AED',leite:'#D97706',penso:'#0C6B3E'};
  var ICO={medicamento:'💊',controlado:'🔒',injetavel:'💉',leite:'🍼',penso:'🩹'};
  var LBL={medicamento:'Farm. Básica',controlado:'Controlado',injetavel:'Injetável',leite:'Leite',penso:'Penso/Material'};

  // Carregar atas do Firebase
  useEffect(function(){
    if(!db)return;
    var u=db.collection('atas').onSnapshot(function(s){
      var list=s.docs.map(function(d){var o={id:d.id};var data=d.data();for(var k in data)o[k]=data[k];return o;});
      list.sort(function(a,b){return (a.nome||'').localeCompare(b.nome||'');});
      setAtas(list);
    },function(){});
    return function(){u();};
  },[]);

  // ── CÁLCULO DE PREVISÃO ──────────────────────────────────────
  // Descobrir quantos dias de histórico existem
  function diasHistorico(){
    var datas=entries.filter(function(e){return e.tipo==='saida';}).map(function(e){return e.date||(e.criadoEm||'').slice(0,10);}).filter(Boolean);
    if(datas.length===0)return 0;
    datas.sort();
    var primeira=new Date(datas[0]+'T12:00:00');
    var hoje=new Date();
    return Math.max(1,Math.round((hoje-primeira)/(1000*60*60*24)));
  }

  // Consumo total de um medicamento num período (em dias atrás)
  function consumoPeriodo(medId,diasAtras){
    var limite=new Date();limite.setDate(limite.getDate()-diasAtras);
    var total=0;
    entries.forEach(function(e){
      if(e.tipo!=='saida'||e.medicamentoId!==medId)return;
      var d=new Date((e.date||(e.criadoEm||'').slice(0,10))+'T12:00:00');
      if(d>=limite)total+=(Number(e.quantidade)||0);
    });
    return total;
  }

  // Calcular previsão de um medicamento — retorna {pedir, metodo, detalhe}
  function calcularPrevisao(med){
    var dias=diasHistorico();
    var estoqueAtual=stock[med.id]||0;
    var minimo=Number(med.minEstoque||med.estoqueMin||0);

    // FASE 1: pouco histórico (<25 dias) → usa consumo mensal estimado
    var consEstim=Number(med.consumoEstimado||0);
    if(dias<25){
      if(consEstim>0){
        // projetar o consumo estimado para o período escolhido
        var projEstim=Math.ceil((consEstim/30)*diasPrev);
        var margemE=Math.ceil(projEstim*0.15);
        var pedirE=Math.max(0,projEstim+margemE-estoqueAtual);
        return {pedir:pedirE,metodo:'estimado',detalhe:'Estimado '+consEstim+'/mês → '+projEstim+' em '+diasPrev+'d + margem '+margemE+' − estoque '+estoqueAtual,fase:1,consumoMes:projEstim};
      }
      // fallback: se não tem consumo estimado, usa o mínimo
      var alvo=minimo>0?minimo:0;
      var pedir1=Math.max(0,alvo-estoqueAtual);
      return {pedir:pedir1,metodo:'minimo',detalhe:minimo>0?('Alvo mínimo '+minimo+' − estoque '+estoqueAtual):'Defina o consumo estimado ou o mínimo deste item',fase:1,consumoMes:null};
    }

    // FASE 2: 25-55 dias → média de consumo diário projetada
    var cons30=consumoPeriodo(med.id,30);
    var consDiario=cons30/Math.min(dias,30);
    var projecaoMes=Math.ceil(consDiario*diasPrev);

    if(dias<55){
      var margem=minimo>0?Math.ceil(minimo*0.2):Math.ceil(projecaoMes*0.15);
      var pedir2=Math.max(0,projecaoMes+margem-estoqueAtual);
      return {pedir:pedir2,metodo:'media',detalhe:'Consumo ~'+consDiario.toFixed(1)+'/dia × '+diasPrev+'d = '+projecaoMes+' + margem '+margem+' − estoque '+estoqueAtual,fase:2,consumoMes:projecaoMes};
    }

    // FASE 3: 55+ dias → tendência (compara últimos 30d vs 30d anteriores)
    var consRecente=consumoPeriodo(med.id,30);
    var consAnterior=consumoPeriodo(med.id,60)-consRecente;
    var tendencia=0;
    if(consAnterior>0)tendencia=(consRecente-consAnterior)/consAnterior;
    var fatorTend=1+Math.max(-0.3,Math.min(0.5,tendencia));
    var projTend=Math.ceil((consRecente/30)*diasPrev*fatorTend);
    var margem3=minimo>0?Math.ceil(minimo*0.2):Math.ceil(projTend*0.15);
    var pedir3=Math.max(0,projTend+margem3-estoqueAtual);
    var tendStr=tendencia>0.05?('alta +'+Math.round(tendencia*100)+'%'):(tendencia<-0.05?('queda '+Math.round(tendencia*100)+'%'):'estável');
    return {pedir:pedir3,metodo:'tendencia',detalhe:'Tendência '+tendStr+' · proj '+projTend+' + margem '+margem3+' − estoque '+estoqueAtual,fase:3,consumoMes:projTend};
  }

  // Medicamentos de uma ata
  function medsDaAta(ataId){
    var porAtaId=medications.filter(function(m){return m.ataId===ataId;});
    // Também buscar pelos medicamentos vinculados nos itens da ata
    var ataObj=atas.find(function(a){return a.id===ataId;});
    if(!ataObj||!ataObj.itens||!ataObj.itens.length)return porAtaId;
    var porItens=medications.filter(function(m){
      return ataObj.itens.some(function(it){return it.medicamentoId&&it.medicamentoId===m.id;});
    });
    // Combinar sem duplicatas
    var mapa={};
    porAtaId.concat(porItens).forEach(function(m){mapa[m.id]=m;});
    return Object.values(mapa);
  }
  // Medicamentos sem ata

  // ── AÇÕES ────────────────────────────────────────────────────
  function importarAtaDocx(file){
    if(!file)return;
    setImportando(true);
    var reader=new FileReader();
    reader.onload=function(ev){
      var ab=ev.target.result;
      if(typeof mammoth==='undefined'){setMsg('e:Biblioteca não carregou. Recarregue.');setImportando(false);return;}
      mammoth.convertToHtml({arrayBuffer:ab}).then(function(res){
        var div=document.createElement('div');div.innerHTML=res.value;
        var tabs=div.querySelectorAll('table');
        var itens=[];
        var loteAtual='';
        tabs.forEach(function(tab){
          // Detectar número do lote no cabeçalho da tabela (ex: "Lote 1", "Lote 25")
          var primeiraLinha=tab.querySelector('tr');
          if(primeiraLinha){
            var txt=primeiraLinha.textContent.trim();
            var mLote=txt.match(/^Lote\s*(\d+)/i);
            if(mLote)loteAtual=mLote[1];
          }
          tab.querySelectorAll('tr').forEach(function(tr){
            var cs=tr.querySelectorAll('td,th');
            if(cs.length<2)return;
            var tx=function(i){return cs[i]?cs[i].textContent.trim():'';}; 
            var col0=tx(0);
            // Ignorar linhas de cabeçalho
            if(col0.toLowerCase().indexOf('descri')>=0||col0.toLowerCase().indexOf('item')>=0)return;
            if(col0.toLowerCase().indexOf('lote')>=0||col0.toLowerCase().indexOf('marca')>=0||col0.toLowerCase().indexOf('total')>=0)return;

            var n='',desc='',marca='',qtd='',unid='',vU='';

            // FORMATO SERRA MAR / contratos: num | desc | marca | qtd | unid | vUnit | vTotal
            if(/^\d+$/.test(col0)&&cs.length>=5){
              n=col0;
              if(cs.length>=7){desc=tx(1);marca=tx(2);qtd=tx(3);unid=tx(4);vU=tx(5);}
              else if(cs.length===6){desc=tx(1);marca=tx(2);qtd=tx(3);unid=tx(4);vU=tx(5);}
              else if(cs.length===5){desc=tx(1);qtd=tx(2);unid=tx(3);vU=tx(4);}
              else{desc=tx(1);qtd=tx(2);}
            }
            // FORMATO ATAs novas: desc | qtd | unid | vUnit | subTotal (sem número no início)
            else if(col0&&col0.length>3&&!(/^\d+$/.test(col0))){
              // É uma linha de item sem número — o número vem do Lote
              n=loteAtual||'';
              if(cs.length>=5){desc=tx(0);qtd=tx(1);unid=tx(2);vU=tx(3);}
              else if(cs.length===4){desc=tx(0);qtd=tx(1);unid=tx(2);vU=tx(3);}
              else if(cs.length===3){desc=tx(0);qtd=tx(1);unid=tx(2);}
              else{desc=tx(0);qtd=tx(1);}
              // Linha de marca — pular
              if(desc.toLowerCase().indexOf('marca:')>=0||desc.toLowerCase().indexOf('fabricante:')>=0)return;
              // Linha de valor total — pular
              if(desc.toLowerCase().indexOf('total')>=0&&qtd===''&&cs.length<4)return;
            } else return;

            var qN=parseInt((qtd||'').replace(/[^0-9]/g,''))||0;
            if(!desc||qN===0)return;
            var vUN=parseFloat((vU||'').replace(/[^0-9,]/g,'').replace(',','.'))||0;
            itens.push({num:n,descricao:desc,marca:marca,qtdTeto:qN,unidade:unid,vUnit:vUN,pedidoAcumulado:0,medicamentoId:''});
          });
        });
        if(itens.length===0){setMsg('e:Nenhum item encontrado na tabela. Verifique o arquivo.');setImportando(false);return;}
        setImportPreview(itens);
        if(!importNome)setImportNome(file.name.replace(/\.docx?$/i,''));
        setImportando(false);
        setMsg('ok:'+itens.length+' itens lidos! Confira abaixo e salve.');
        setTimeout(function(){setMsg('');},4000);
      }).catch(function(e){setMsg('e:Erro ao ler: '+e.message);setImportando(false);});
    };
    reader.onerror=function(){setMsg('e:Erro ao abrir arquivo');setImportando(false);};
    reader.readAsArrayBuffer(file);
  }
  function salvarAtaImportada(){
    if(!importPreview||!importNome.trim()){setMsg('e:Dê um nome à ata antes de salvar');return;}
    var vTot=importPreview.reduce(function(a,it){return a+(it.vUnit*it.qtdTeto);},0);
    db.collection('atas').add({nome:importNome.trim(),categoria:importCat,limite:0,valorTotal:parseFloat(vTot.toFixed(2)),itens:importPreview,criadoEm:new Date().toISOString(),criadoPor:user.name}).then(function(){

      setTimeout(function(){setMsg('');},4000);
    }).catch(function(e){setMsg('e:'+e.message);});
  }
  function atualizarItemAta(ataId,itens,novoItem,idxIt){
    var novos=itens.map(function(x,j){return j===idxIt?Object.assign({},x,novoItem):x;});
    var p=[db.collection('atas').doc(ataId).update({itens:novos})];
    // Sincronizar ataId no medicamento
    if(novoItem.medicamentoId!==undefined){
      var antigo=itens[idxIt]&&itens[idxIt].medicamentoId;
      if(novoItem.medicamentoId){
        // Vinculando: salvar ataId no medicamento
        p.push(db.collection('medicamentos').doc(novoItem.medicamentoId).update({ataId:ataId}));
      }
      if(antigo&&antigo!==novoItem.medicamentoId){
        // Desvinculando o anterior: remover ataId
        p.push(db.collection('medicamentos').doc(antigo).update({ataId:''}));
      }
    }
    return Promise.all(p);
  }

function handleDenyInvite(invite){db.collection('plantao_convites').doc(invite.id).update({status:'negou'}).catch(function(){});setPendingInvite(null);setIsGuest(true);}
function solicitarEntradaPlantao(){if(!plantao||!shiftId)return;if(!confirm('Solicitar entrada no plantao?'))return;var hoje=todayStr();db.collection('plantao_solicitacoes').where('de','==',user.uid).where('data','==',hoje).where('status','==','pendente').get().then(function(s){if(!s.empty){alert('Solicitação ja enviada.');return;}db.collection('plantao_solicitacoes').add({de:user.uid,deNome:user.name,deCargo:user.role,deColor:user.color,para:plantao.iniciadoPor,paraNome:plantao.iniciadoPorNome,data:hoje,status:'pendente',criadoEm:new Date().toISOString()}).then(function(){playSound('success');alert('Solicitação enviada!');});});}
function aprovarEntradaPlantao(sol){var hoje=todayStr();var novoMembro={id:sol.de,nome:sol.deNome,cargo:sol.deCargo,color:sol.deColor,status:'confirmado'};var equipeAtual=plantao?plantao.equipe||[]:[];var jaEsta=equipeAtual.some(function(m){return m.id===sol.de;});var novaEquipe=jaEsta?equipeAtual:equipeAtual.concat([novoMembro]);db.collection('plantoes').doc(hoje).update({equipe:novaEquipe}).then(function(){db.collection('plantao_solicitacoes').doc(sol.id).update({status:'aprovado'});if(plantao){var p={};for(var k in plantao)p[k]=plantao[k];p.equipe=novaEquipe;setPlantao(p);}playSound('success');});}
function recusarEntradaPlantao(sol){db.collection('plantao_solicitacoes').doc(sol.id).update({status:'recusado'}).catch(function(){});}
function encerrarPlantao(){if(!shiftId)return;if(!confirm('Encerrar o plantao de hoje?'))return;db.collection('plantoes').doc(shiftId).update({ativo:false,encerradoEm:new Date().toISOString()}).then(function(){localStorage.setItem('fc_shift_enc_'+todayStr(),'1');setPlantao(null);setIsGuest(true);setShiftId(null);}).catch(function(e){alert('Erro: '+e.message);});}
function sairDoPlantao(){if(!confirm('Sair do plantao?'))return;localStorage.setItem('fc_shift_saiu_'+todayStr(),'1');if(shiftId&&plantao){var eq=(plantao.equipe||[]).map(function(m){if(m.id===user.uid){var o={};for(var k in m)o[k]=m[k];o.status='saiu';return o;}return m;});db.collection('plantoes').doc(shiftId).update({equipe:eq}).catch(function(){});}setIsGuest(true);}
function addSolicitacao(data){var obj={medicamentoId:data.medicamentoId,medicamentoNome:data.medicamentoNome,ean:data.ean||'',tipo:data.tipo,quantidade:data.quantidade,lote:data.lote||'',validade:data.validade||'',observacao:data.observação||'',solicitanteId:user.uid,solicitanteNome:user.name,solicitanteCargo:user.role,solicitanteColor:user.color||B,status:'pendente',criadoEm:new Date().toISOString(),origem:'convidado'};return db.collection('solicitacoes').add(obj);}
function addEntry(data){try{var obj={criadoEm:new Date().toISOString(),date:todayStr(),autorId:user.uid,autorNome:user.name||user.email,autorCargo:user.role||'',autorColor:user.color||B};for(var k in data)obj[k]=data[k];if(obj.quantidade!==undefined)obj.quantidade=Number(obj.quantidade)||0;
  var promise=db.collection('entries').add(obj);
  // Se for saída real, verificar se há divergência de substituição vinculada
  if(obj.tipo==='saida'&&obj.medicamentoId&&!obj.ficticioDiv){
    promise=promise.then(function(ref){
      // Buscar divergências do tipo substituição onde este med é o 'real'
      return db.collection('divergencias')
        .where('realMedId','==',obj.medicamentoId)
        .where('tipo','==','substituicao')
        .where('status','!=','encerrada')
        .get().then(function(snap){
          if(snap.empty)return ref;
          var espelhos=[];
          snap.docs.forEach(function(doc){
            var div=doc.data();
            // Gerar saída fictícia do medicamento da nota
            var ficObj={criadoEm:new Date().toISOString(),date:todayStr(),
              autorId:user.uid,autorNome:user.name||user.email,autorCargo:user.role||'',autorColor:user.color||B,
              medicamentoId:div.notaMedId,medicamentoNome:div.notaMedNome,
              tipo:'saida',quantidade:obj.quantidade,
              lote:'',validade:'',
              obs:'[FICTÍCIO] Espelho de saída de '+obj.medicamentoNome+' — Div. NF '+(div.nfNumero||''),
              ficticioDiv:true,divId:doc.id,divOrigMedId:obj.medicamentoId
            };
            espelhos.push(
              db.collection('entries').add(ficObj).then(function(){
                // Atualizar total de saídas fictícias na divergência
                return db.collection('divergencias').doc(doc.id).update({
                  saidaFicticiaTotal:(div.saidaFicticiaTotal||0)+obj.quantidade
                });
              })
            );
          });
          return Promise.all(espelhos).then(function(){return ref;});
        }).catch(function(){return ref;});
    });
  }
  return promise;
}catch(e){console.error('addEntry erro:',e);return Promise.reject(e);}}

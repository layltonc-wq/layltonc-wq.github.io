      for(var j=0;j<medications.length;j++){if(medications[j].id===medId){med=medications[j];break;}}
      if(med)itens.push({med:med,qty:q});
    }
  }
  if(itens.length===0){setOkNota('Nenhuma quantidade informada.');return;}
  if(!confirm('Confirmar entrada de '+itens.length+' medicamento(s)?'))return;
  setSalvandoNota(true);
  var idx=0;
  function next(){
    if(idx>=itens.length){
      playSound('success');
      setOkNota('Entrada de '+itens.length+' medicamento(s) registrada!');
      setQtds({});setLoteNota('');setValNota('');
      setSalvandoNota(false);
      setTimeout(function(){setOkNota('');},5000);
      return;
    }
    var item=itens[idx];idx++;
    onSave({medicamentoId:item.med.id,medicamentoNome:item.med.nome,ean:item.med.ean||'',tipo:'entrada',quantidade:item.qty,lote:loteNota.trim(),validade:valNota.trim(),observacao:'Entrada por nota'}).then(next).catch(next);
  }
  next();
}

function HistModal(props){var med=props.med;var entries=props.entries;var onClose=props.onClose;var hist=entries.filter(function(e){return e.medicamentoId===med.id;}).sort(function(a,b){return (b.criadoEm||'').localeCompare(a.criadoEm||'');});var totE=0;hist.forEach(function(e){if(e.tipo==='entrada')totE+=(e.quantidade||0);});var totS=0;hist.forEach(function(e){if(e.tipo==='saida')totS+=(e.quantidade||0);});return(<Modal onClose={onClose} title={'Historico - '+med.nome} wide={true}><div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}><div style={{background:'#e6f4ee',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:700,color:'#1B7A4E'}}>Entradas: {totE}</div><div style={{background:'#fdecea',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:700,color:'#C0392B'}}>Saidas: {totS}</div><div style={{background:'#EAF0FB',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:700,color:B}}>Saldo: {totE-totS}</div></div><div style={{maxHeight:400,overflowY:'auto'}}>{hist.length===0?<div style={{textAlign:'center',padding:32,color:'#94a3b8'}}>Nenhum registro.</div>:hist.map(function(e,i){return(<div key={e.id} style={{padding:'12px 14px',borderTop:i>0?'1px solid #f1f5f9':'none',display:'flex',gap:10,alignItems:'flex-start'}}><div style={{width:8,height:8,borderRadius:'50%',background:e.tipo==='entrada'?'#16a34a':'#dc2626',flexShrink:0,marginTop:5}}/><div style={{flex:1}}><div style={{fontSize:12,color:'#64748B'}}>{fmtD(e.criadoEm)} {fmtT(e.criadoEm)} - {e.autorNome}</div>{(e.lote||e.observacao)&&<div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{e.lote?'Lote: '+e.lote:''}{e.lote&&e.observacao?' - ':''}{e.observacao}</div>}</div><span style={{fontWeight:800,fontSize:16,color:e.tipo==='entrada'?'#16a34a':'#dc2626'}}>{e.tipo==='entrada'?'+':'-'}{e.quantidade}</span></div>);})}</div></Modal>);}

var _newEan=useState('');var newEan=_newEan[0];var setNewEan=_newEan[1];
var _newMin=useState('');var newMin=_newMin[0];var setNewMin=_newMin[1];

  var lotes=Object.keys(loteMap).map(function(k){return loteMap[k];}).filter(function(l){return l.qty>0;});
  var ultimaEntrada=medEntries.sort(function(a,b){return (b.criadoEm||'').localeCompare(a.criadoEm||'');});
  var infoLast=ultimaEntrada.length>0?{lote:ultimaEntrada[0].lote||'',validade:ultimaEntrada[0].validade||''}:{lote:'',validade:''};
  if(m.loteAtual)infoLast.lote=m.loteAtual;

  return {id:m.id,nome:m.nome,ean:m.ean,est:stock[m.id]||0,info:infoLast,minEstoque:m.minEstoque||0,cat:m.categoria||'medicamento',lotes:lotes};
});

function getDiasVal(val){if(!val)return null;var p=val.split('/');if(p.length!==2)return null;var d=new Date(parseInt(p[1]),parseInt(p[0])-1,1);return Math.ceil((d-hoje)/86400000);}

var venc30=[];var venc60=[];var venc90=[];var vencidos=[];
medications.forEach(function(m){

  var dias=getDiasVal(info.validade);if(dias===null)return;

});

venc60.sort(function(a,b){return a.dias-b.dias;});
venc90.sort(function(a,b){return a.dias-b.dias;});

var faltas=medList.filter(function(m){return m.minEstoque>0&&m.est<=m.minEstoque;});

var totalAlertas=vencidos.length+venc30.length+faltas.length;

function exportAlertasXL(){var rows=[['Tipo Alerta','Medicamento','Estoque','Minimo','Validade','Lote','Dias para Vencer']];vencidos.forEach(function(m){rows.push(['VENCIDO',m.nome,m.est,'',m.validade,m.lote,m.dias]);});venc30.forEach(function(m){rows.push(['Vence em 30 dias',m.nome,m.est,'',m.validade,m.lote,m.dias]);});venc60.forEach(function(m){rows.push(['Vence em 60 dias',m.nome,m.est,'',m.validade,m.lote,m.dias]);});venc90.forEach(function(m){rows.push(['Vence em 90 dias',m.nome,m.est,'',m.validade,m.lote,m.dias]);});zerados.forEach(function(m){rows.push(['Estoque Zerado',m.nome,m.est,m.minEstoque,m.info?m.info.validade:'','',0]);});baixos.forEach(function(m){rows.push(['Estoque Baixo',m.nome,m.est,m.minEstoque,m.info?m.info.validade:'','',0]);});var wb=XLSX.utils.book_new();var ws=XLSX.utils.aoa_to_sheet(rows);XLSX.utils.book_append_sheet(wb,ws,'Alertas');XLSX.writeFile(wb,'alertas_estoque_'+todayStr()+'.xlsx');}

function saveNew(){if(!newNome.trim())return;setSaving(true);db.collection('medicamentos').add({nome:newNome.trim(),ean:newEan.trim(),minEstoque:parseInt(newMin)||0,categoria:newTipo,criadoEm:new Date().toISOString()}).then(function(){setShowAdd(false);setNewNome('');setNewEan('');setNewMin('');setNewTipo('medicamento');setSaving(false);});}
function saveEdit(){setSaving(true);db.collection('medicamentos').doc(editId).update({nome:editNome.trim(),minEstoque:parseInt(editMin)||0,categoria:editTipo}).then(function(){setEditId(null);setSaving(false);});}
function delMed(id){if(!confirm('Excluir medicamento?'))return;db.collection('medicamentos').doc(id).delete();}

function salvarEditLote(){
  if(!editLote)return;
  setSaving(true);
  var loteVal=editLoteVal.trim();
  var validadeVal=editLoteData.trim();
  var medId=editLote.medId;
  var promises=[];
  if(medId){
    promises.push(db.collection('medicamentos').doc(medId).update({loteAtual:loteVal,validadeAtual:validadeVal}));
  }
  if(editLote.entryId){
    promises.push(db.collection('entries').doc(editLote.entryId).update({lote:loteVal,validade:validadeVal}).catch(function(){}));
  }
  Promise.all(promises).then(function(){
    setEditLote(null);setSaving(false);
  }).catch(function(e){alert('Erro: '+e.message);setSaving(false);});
}

function salvarAjuste(){
  if(!ajusteMed)return;
  var novaQty=parseInt(ajusteQty);
  if(isNaN(novaQty)||novaQty<0){alert('Quantidade invalida.');return;}
  if(!ajusteMotivo.trim()){alert('Informe o motivo do ajuste.');return;}
  var atual=stock[ajusteMed.id]||0;
  var diff=novaQty-atual;
  if(diff===0){alert('Quantidade igual ao estoque atual.');return;}
  if(!confirm('Ajustar estoque de '+ajusteMed.nome+' de '+atual+' para '+novaQty+'?'))return;
  setSaving(true);
  db.collection('entries').add({
    medicamentoId:ajusteMed.id,medicamentoNome:ajusteMed.nome,ean:ajusteMed.ean||'',
    tipo:diff>0?'entrada':'saida',quantidade:Math.abs(diff),
    lote:'',validade:'',observacao:'AJUSTE DE ESTOQUE: '+ajusteMotivo.trim(),
    criadoEm:new Date().toISOString(),date:todayStr(),
    autorId:user.uid,autorNome:user.name,autorCargo:user.role,autorColor:user.color||'#1351B4',
    isAjuste:true
  }).then(function(){
    setAjusteId(null);setAjusteMed(null);setAjusteQty('');setAjusteMotivo('');setSaving(false);
    alert('Ajuste realizado! Diferenca: '+(diff>0?'+':'')+diff+' unidades.');
  }).catch(function(e){alert('Erro: '+e.message);setSaving(false);});
}

function handleImportXls(file){if(!file)return;setImporting(true);setImportStatus('Lendo arquivo...');var reader=new FileReader();reader.onload=function(e){try{var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:'array'});var catMap={'CONTROLADOS':'controlado','CONTROLADO':'controlado','FARMACIA BASICA':'medicamento','FARMÁCIA BÁSICA':'medicamento','FARMACIA':'medicamento','LEITES':'leite','LEITE':'leite','INJETAVEIS':'injetavel','INJETÁVEIS':'injetavel','INJETAVEL':'injetavel','PENSOS':'penso','PENSO':'penso','MATERIAIS':'penso'};var batch=[];for(var si=0;si<wb.SheetNames.length;si++){var sheetName=wb.SheetNames[si];if(sheetName.toUpperCase().indexOf('INSTRUC')>=0)continue;var ws=wb.Sheets[sheetName];var rows=XLSX.utils.sheet_to_json(ws,{defval:''});if(!rows||rows.length===0)continue;var sheetUpper=sheetName.toUpperCase().trim();var sheetCat='medicamento';for(var key in catMap){if(sheetUpper.indexOf(key)>=0){sheetCat=catMap[key];break;}}for(var i=0;i<rows.length;i++){var row=rows[i];var nome=row['Nome']||row['NOME']||row['nome']||row['DESCRICAO']||'';var cat=row['Categoria']||row['CATEGORIA']||row['categoria']||sheetCat;var est=parseInt(row['Estoque Inicial']||row['ESTOQUE INICIAL']||row['Estoque Final']||row['ESTOQUE FINAL']||row['estoque']||0)||0;var min=parseInt(row['Estoque Minimo']||row['ESTOQUE MINIMO']||row['minimo']||0)||0;var ean=(row['EAN (opcional)']||row['EAN']||row['ean']||'')+'';var val=(row['Validade (MM/AAAA)']||row['VALIDADE']||row['Validade']||row['validade']||'')+'';if(!nome||!nome.trim())continue;var catLower=cat.toLowerCase().trim();if(catLower.indexOf('injet')>=0)catLower='injetavel';else if(catLower.indexOf('penso')>=0||catLower.indexOf('material')>=0)catLower='penso';else if(catLower.indexOf('control')>=0)catLower='controlado';else if(catLower.indexOf('leite')>=0||catLower.indexOf('nutri')>=0)catLower='leite';else catLower='medicamento';batch.push({nome:nome.trim(),categoria:catLower,minEstoque:min,ean:ean,validade:val,estoque:est,criadoEm:new Date().toISOString()});}}if(batch.length===0){setImportStatus('Nenhum item encontrado.');setImporting(false);return;}setImportStatus('Importando '+batch.length+' itens...');var idx=0;var done=0;function next(){if(idx>=batch.length){setImportStatus('Registrando estoques iniciais...');var eIdx=0;function nextEst(){if(eIdx>=batch.length){setImportStatus('Concluido! '+done+' itens importados!');setImporting(false);return;}var item=batch[eIdx];eIdx++;if(item.estoque>0){db.collection('medicamentos').where('nome','==',item.nome).limit(1).get().then(function(s){if(!s.empty){var medId=s.docs[0].id;db.collection('entries').add({medicamentoId:medId,medicamentoNome:item.nome,ean:item.ean||'',tipo:'entrada',quantidade:item.estoque,lote:'',validade:item.validade||'',observacao:'Estoque inicial - Importacao',criadoEm:new Date().toISOString(),date:todayStr(),autorId:user.uid,autorNome:user.name,autorCargo:user.role,autorColor:user.color||'#1351B4'}).then(nextEst).catch(nextEst);}else{nextEst();}}).catch(nextEst);}else{nextEst();}}nextEst();return;}var item=batch[idx];idx++;var medData={nome:item.nome,categoria:item.categoria,minEstoque:item.minEstoque,ean:item.ean,criadoEm:item.criadoEm};db.collection('medicamentos').add(medData).then(function(){done++;next();}).catch(function(){done++;next();});}next();}catch(ex){setImportStatus('Erro: '+ex.message);setImporting(false);}};reader.readAsArrayBuffer(file);}

useEffect(function(){

  function reset(){lastAct.current=Date.now();localStorage.setItem('fc_last_act',String(Date.now()));}

    if(Date.now()-lastAct.current>timeout){localStorage.removeItem('fc_last_act');logout();}

  }

  var u2=db.collection('medicamentos').onSnapshot(function(s){var list=s.docs.map(function(d){var o={id:d.id};var data=d.data();for(var k in data)o[k]=data[k];return o;});list.sort(function(a,b){return a.nome.localeCompare(b.nome);});setMeds(list);});

function checkShift(u){
  if(shiftChecked)return;setShiftChecked(true);
  var today=todayStr();var role=u.role;
  if(role==='gestor'||role==='tecnico'){setIsGuest(false);return;}
  if(!isShiftTime()){setIsGuest(true);setPlantao(null);return;}
  var leftToday=localStorage.getItem('fc_shift_enc_'+today)||localStorage.getItem('fc_shift_saiu_'+today);
  if(leftToday){db.collection('plantoes').doc(today).get().then(function(snap){if(snap.exists&&snap.data().ativo!==false){var p=snap.data();setPlantao(p);setShiftId(today);}}).catch(function(){});setIsGuest(true);return;}
  db.collection('plantao_convites').where('para','==',u.uid).where('status','==','pendente').get().then(function(invSnap){
    var todayInvite=null;for(var i=0;i<invSnap.docs.length;i++){var d=invSnap.docs[i].data();if(d.data===today){var o={id:invSnap.docs[i].id};for(var k in d)o[k]=d[k];todayInvite=o;break;}}
    if(todayInvite){setPendingInvite(todayInvite);playSound('invite');return;}
    db.collection('plantoes').doc(today).get().then(function(snap){
      if(snap.exists&&snap.data().ativo!==false){var p=snap.data();setPlantao(p);setShiftId(today);var inTeam=false;if(p.equipe){for(var i=0;i<p.equipe.length;i++){if(p.equipe[i].id===u.uid&&p.equipe[i].status==='confirmado'){inTeam=true;break;}}}setIsGuest(!inTeam);}
      else{setPlantao(null);if(role==='farmaceutico')setShowShift(true);else setIsGuest(true);}
    }).catch(function(){setIsGuest(true);});
  }).catch(function(){setIsGuest(true);});
}

    {busca&&<BuscaGlobal entries={entries} medications={meds} onClose={function(){setBusca(false);}}/>}
    {showSolicit&&<SolicitModal user={user} medications={meds} onClose={function(){setShowSolicit(false);}}/>}
    {user&&user.role==='farmaceutico'&&solicitacoesPlantao.length>0&&<SolicitacoesPlantaoModal list={solicitacoesPlantao} onApprove={aprovarEntradaPlantao} onDeny={recusarEntradaPlantao} onClose={function(){setSolicitacoesPlantao([]);}}/>}
    <div style={{background:'linear-gradient(135deg,#1351B4,#0C3D8A)',padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10,boxShadow:'0 2px 16px rgba(19,81,180,.3)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,background:'rgba(255,255,255,.2)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#fff',fontWeight:800}}>Rx</div>
        <div>
          <div style={{fontWeight:800,fontSize:15,color:'#fff'}}>FarmaControl</div>
          <div style={{fontSize:9,color:'rgba(255,255,255,.6)'}}>{new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})}</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {lowCount>0&&<div style={{background:'rgba(255,200,0,.2)',border:'1px solid rgba(255,200,0,.4)',borderRadius:20,padding:'3px 8px',fontSize:10,color:'#ffd700',fontWeight:600}}>{'⚠ '+lowCount}</div>}
        <button onClick={function(){setBusca(true);}} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:10,width:34,height:34,cursor:'pointer',fontSize:16,color:'#fff'}}>🔍</button>
        <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.15)',borderRadius:10,padding:'5px 10px'}}>
          <div className="av" style={{width:26,height:26,background:user.color||'rgba(255,255,255,.3)',fontSize:11}}>{user.name?user.name.charAt(0):'?'}</div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#fff'}}>{(user.name||'').split(' ')[0]}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.6)'}}>{isGuest?'Convidado':ROLES[user.role]||user.role}</div>
          </div>
        </div>
      </div>
    </div>
    {isGuest&&<div style={{background:'#b7791f',color:'#fff',textAlign:'center',padding:'8px 14px',fontSize:12,fontWeight:600}}>Modo Convidado</div>}
    {!online&&<div style={{background:'#64748B',color:'#fff',textAlign:'center',padding:'8px',fontSize:13,fontWeight:600}}>Sem conexao</div>}
    <div className="fadeUp">
      {loading?(
        <div style={{minHeight:'60vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:40}}>
          <div style={{fontSize:40,marginBottom:12}}>⚕</div>
          <div style={{fontWeight:800,fontSize:20,color:'#1351B4',marginBottom:8}}>FarmaControl</div>
          <div style={{fontSize:13,color:'#94a3b8'}}>Carregando...</div>
        </div>
      ):(
        <div>
          {tab==='dashboard'&&<TabDashboard entries={entries} medications={meds} stock={stock} user={user} plantao={plantao} isGuest={isGuest} onSolicitar={function(){setShowSolicit(true);}} onEncerrar={encerrarPlantao} onSair={sairDoPlantao} onSolicitarEntrada={solicitarEntradaPlantao} shiftId={shiftId} onIniciar={function(){setShowShiftModal(true);}}/>}
          {tab==='saida'&&<TabSaida user={user} medications={meds} stock={stock} entries={entries} onSave={addEntry} onSolicitar={addSolicitacao} latest={latest} isGuest={isGuest} canMove={canMove}/>}
          {tab==='entrada'&&<TabEntrada user={user} medications={meds} onSave={addEntry} onSolicitar={addSolicitacao} isGuest={isGuest} canMove={canMove}/>}
          {tab==='estoque'&&<TabEstoque user={user} medications={meds} entries={entries} stock={stock}/>}
          {tab==='relatorio'&&can(user.role,'relatorio')&&<TabRelatorio entries={entries} medications={meds}/>}
          {tab==='gestao'&&can(user.role,'gestao')&&<TabGestao currentUser={user} entries={entries}/>}
          {tab==='log'&&can(user.role,'log')&&<TabLog/>}
          {tab==='histcontas'&&can(user.role,'log')&&<TabHistContas/>}
          {tab==='perfil'&&<TabPerfil user={user} onUpdate={function(u){setUser(u);}} onLogout={logout} entries={entries} medications={meds} stock={stock}/>}
        </div>
      )}
    </div>
    <nav className="bnav">
      {navTabs.map(function(t){return(
        <button key={t.id} className={'nb'+(tab===t.id?' on':'')} onClick={function(){setTab(t.id);}}>
          <span className="ni">{t.icon}</span>
          <span className="nl">{t.label}</span>
          {t.badge>0&&<span className="nbadge">{t.badge}</span>}
        </button>
      );})}
    </nav>
  </div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
